<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>我的影像空间</title>
  <style>
    /* ===== 全局重置 & 基础样式 ===== */
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "PingFang SC",
        "Hiragino Sans GB", "Microsoft YaHei", "Helvetica Neue", Arial, sans-serif;
      background-color: #f8f8f8;
      color: #333;
      line-height: 1.6;
    }

    .container {
      max-width: 1200px;
      margin: 0 auto;
      padding: 0 24px;
    }

    /* ===== 导航栏 ===== */
    .navbar {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 20px 0;
      border-bottom: 1px solid #eaeaea;
    }

    .navbar .site-name {
      font-size: 1.25rem;
      font-weight: 600;
      letter-spacing: 1px;
      color: #1a1a1a;
      cursor: pointer;
    }

    .navbar .nav-links {
      list-style: none;
      display: flex;
      gap: 28px;
    }

    .navbar .nav-links a {
      text-decoration: none;
      color: #666;
      font-size: 0.9rem;
      transition: color 0.2s;
      cursor: pointer;
    }

    .navbar .nav-links a:hover {
      color: #1a1a1a;
    }

    /* 当前激活的导航链接高亮 */
    .navbar .nav-links a.active {
      color: #1a1a1a;
      border-bottom: 1px solid #1a1a1a;
      padding-bottom: 2px;
    }

    /* ===== 页面容器 — 所有页面共用 ===== */
    .page {
      display: none;  /* 默认隐藏，通过 JS 切换显示 */
    }

    .page.active {
      display: block;
      animation: fadeIn 0.3s ease;
    }

    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(8px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    /* ===== 首页 — Banner ===== */
    .banner {
      text-align: center;
      padding: 80px 0 64px;
    }

    .banner h1 {
      font-size: 2.2rem;
      font-weight: 400;
      letter-spacing: 4px;
      color: #1a1a1a;
      margin-bottom: 16px;
    }

    .banner p {
      font-size: 1rem;
      color: #999;
      letter-spacing: 2px;
    }

    .banner::after {
      content: "";
      display: block;
      width: 40px;
      height: 2px;
      background: #ccc;
      margin: 32px auto 0;
    }

    /* ===== 首页 — 画廊网格 ===== */
    .gallery {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 20px;
      padding-bottom: 80px;
    }

    .gallery-item {
      position: relative;
      aspect-ratio: 4 / 3;
      background: #e8e8e8;
      border: 1px solid #eee;
      border-radius: 4px;
      overflow: hidden;
      transition: box-shadow 0.3s, transform 0.3s;
    }

    .gallery-item:hover {
      box-shadow: 0 8px 30px rgba(0, 0, 0, 0.08);
      transform: translateY(-3px);
    }

    .gallery-item img {
      display: block;
      width: 100%;
      height: 100%;
      object-fit: cover;
      transition: transform 0.4s ease, opacity 0.4s;
    }

    .gallery-item:hover img {
      transform: scale(1.05);
    }

    /* ===== 关于页 & 联系页（通用） ===== */
    .text-page {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 60vh;        /* 垂直居中，留白大气 */
      text-align: center;
      padding: 80px 24px;
    }

    .text-page .main-text {
      font-size: 2rem;
      font-weight: 400;
      letter-spacing: 3px;
      color: #1a1a1a;
      line-height: 1.8;
      max-width: 600px;
    }

    /* 关键文字高亮（增加一点视觉趣味） */
    .text-page .highlight {
      color: #c0392b;          /* 暗红色，醒目但不刺眼 */
      font-weight: 500;
    }

    /* 装饰线 */
    .text-page .divider {
      width: 40px;
      height: 2px;
      background: #ccc;
      margin: 28px auto;
    }

    /* 返回首页的小提示 */
    .text-page .back-hint {
      font-size: 0.85rem;
      color: #aaa;
      margin-top: 40px;
      cursor: pointer;
      transition: color 0.2s;
    }

    .text-page .back-hint:hover {
      color: #666;
    }

    /* ===== 联系方式区域（首页底部） ===== */
    .contact-section {
      text-align: center;
      padding: 60px 0 48px;
      border-top: 1px solid #eaeaea;
    }

    .contact-section h2 {
      font-size: 1.4rem;
      font-weight: 400;
      letter-spacing: 2px;
      color: #1a1a1a;
      margin-bottom: 20px;
    }

    .contact-section .contact-item {
      display: inline-flex;
      align-items: center;
      gap: 10px;
      font-size: 1rem;
      color: #666;
      letter-spacing: 1px;
    }

    .contact-section .contact-item .icon {
      font-size: 1.2rem;
    }

    .contact-section .phone-link {
      color: #1a1a1a;
      text-decoration: none;
      border-bottom: 1px solid #ddd;
      padding-bottom: 2px;
      transition: border-color 0.2s;
    }

    .contact-section .phone-link:hover {
      border-color: #1a1a1a;
    }

    /* ===== Footer ===== */
    .footer {
      text-align: center;
      padding: 24px 0 32px;
      font-size: 0.85rem;
      color: #aaa;
      letter-spacing: 0.5px;
    }

    /* ===== 响应式 ===== */
    @media (max-width: 900px) {
      .gallery {
        grid-template-columns: repeat(2, 1fr);
        gap: 16px;
      }

      .banner { padding: 56px 0 48px; }
      .banner h1 { font-size: 1.8rem; }

      .text-page .main-text { font-size: 1.6rem; }
    }

    @media (max-width: 600px) {
      .container { padding: 0 16px; }

      .navbar {
        flex-direction: column;
        gap: 12px;
        padding: 16px 0;
      }

      .navbar .nav-links { gap: 20px; }

      .gallery {
        grid-template-columns: 1fr;
        gap: 14px;
        padding-bottom: 48px;
      }

      .banner { padding: 40px 0 36px; }
      .banner h1 { font-size: 1.5rem; letter-spacing: 2px; }

      .text-page { padding: 60px 16px; }
      .text-page .main-text { font-size: 1.3rem; }

      .contact-section { padding: 40px 0 32px; }
    }
  </style>
</head>
<body>

  <!-- ============================================= -->
  <!-- 导航栏（全局固定） -->
  <!-- ============================================= -->
  <div class="container">
    <nav class="navbar">
      <span class="site-name" onclick="showPage('home')">我的影像空间</span>
      <ul class="nav-links">
        <!-- 注意：href 用 #，onclick 接管导航行为 -->
        <li><a href="#" onclick="showPage('home'); return false;" id="nav-home" class="active">首页</a></li>
        <li><a href="#" onclick="showPage('about'); return false;" id="nav-about">关于</a></li>
        <li><a href="#" onclick="showPage('contact'); return false;" id="nav-contact">联系方式</a></li>
      </ul>
    </nav>
  </div>

  <!-- ============================================= -->
  <!-- 页面：首页（home） -->
  <!-- ============================================= -->
  <div id="page-home" class="page active">
    <div class="container">
      <!-- Banner -->
      <section class="banner">
        <h1>记录生活的美好瞬间</h1>
        <p>每一张照片，都是一段故事</p>
      </section>

      <!-- 画廊 -->
      <section class="gallery">
        <div class="gallery-item">
          <img src="https://images.unsplash.com/photo-1506905925346-21bda4d32df4?w=800&q=80" alt="雪山日出" loading="lazy">
        </div>
        <div class="gallery-item">
          <img src="https://images.unsplash.com/photo-1470071459604-3b5ec3a7fe05?w=800&q=80" alt="林间溪流" loading="lazy">
        </div>
        <div class="gallery-item">
          <img src="https://images.unsplash.com/photo-1504898770365-14faca6a7320?w=800&q=80" alt="极光星空" loading="lazy">
        </div>
        <div class="gallery-item">
          <img src="https://images.unsplash.com/photo-1507525428034-b723cf961d3e?w=800&q=80" alt="海滩日落" loading="lazy">
        </div>
        <div class="gallery-item">
          <img src="https://images.unsplash.com/photo-1472214103451-9374bd1c798e?w=800&q=80" alt="秋日山野" loading="lazy">
        </div>
        <div class="gallery-item">
          <img src="https://images.unsplash.com/photo-1441974231531-c6227db76b6e?w=800&q=80" alt="森林光影" loading="lazy">
        </div>
      </section>

      <!-- 联系信息（首页底部也保留） -->
      <section class="contact-section">
        <h2>联系我</h2>
        <div class="contact-item">
          <span class="icon">📞</span>
          <a class="phone-link" href="tel:18831780639">18831780639</a>
        </div>
      </section>
    </div>
  </div>

  <!-- ============================================= -->
  <!-- 页面：关于（about） -->
  <!-- ============================================= -->
  <div id="page-about" class="page">
    <div class="container">
      <section class="text-page">
        <div class="main-text">
          <span class="highlight">刘亚朔</span>是国服马超，<br>亿万少女的梦
        </div>
        <div class="divider"></div>
        <div class="back-hint" onclick="showPage('home')">← 返回首页</div>
      </section>
    </div>
  </div>

  <!-- ============================================= -->
  <!-- 页面：联系方式（contact） -->
  <!-- ============================================= -->
  <div id="page-contact" class="page">
    <div class="container">
      <section class="text-page">
        <div class="main-text">
          六级<span class="highlight">必过</span>
        </div>
        <div class="divider"></div>
        <div class="back-hint" onclick="showPage('home')">← 返回首页</div>
      </section>
    </div>
  </div>

  <!-- ============================================= -->
  <!-- Footer（全局固定） -->
  <!-- ============================================= -->
  <div class="container">
    <footer class="footer">
      © 2024 个人练手网站
    </footer>
  </div>

  <!-- ============================================= -->
  <!-- JavaScript：页面切换逻辑 + 容错 -->
  <!-- ============================================= -->
  <script>
    /**
     * showPage — 切换显示指定页面
     * @param {string} pageName - 'home' | 'about' | 'contact'
     */
    function showPage(pageName) {
      // 1. 隐藏所有页面
      document.querySelectorAll('.page').forEach(function (page) {
        page.classList.remove('active');
      });

      // 2. 显示目标页面
      var target = document.getElementById('page-' + pageName);
      if (target) {
        target.classList.add('active');
      }

      // 3. 更新导航高亮
      document.querySelectorAll('.nav-links a').forEach(function (link) {
        link.classList.remove('active');
      });
      var navLink = document.getElementById('nav-' + pageName);
      if (navLink) {
        navLink.classList.add('active');
      }

      // 4. 滚动到页面顶部（切换页面时更自然）
      window.scrollTo({ top: 0, behavior: 'smooth' });
    }

    // 图片加载失败时降级处理
    document.querySelectorAll('.gallery-item img').forEach(function (img) {
      img.addEventListener('error', function () {
        var placeholder = document.createElement('div');
        placeholder.textContent = '图片加载失败';
        placeholder.style.cssText =
          'position:absolute; top:50%; left:50%; transform:translate(-50%,-50%); ' +
          'font-size:0.85rem; color:#bbb; letter-spacing:1px; pointer-events:none;';
        this.parentElement.appendChild(placeholder);
        this.style.opacity = '0.15';
      });
    });

    console.log('炎龙侠说：多页面切换已就绪 🐉🔥');
  </script>
</body>
</html>
