<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>我的影像空间</title>
  <style>
    /* ===== 全局重置 & 基础样式 ===== */
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "PingFang SC",
        "Hiragino Sans GB", "Microsoft YaHei", "Helvetica Neue", Arial, sans-serif;
      background-color: #f8f8f8;  /* 浅灰背景，干净柔和 */
      color: #333;
      line-height: 1.6;
    }

    /* 容器 — 控制内容最大宽度并居中 */
    .container {
      max-width: 1200px;
      margin: 0 auto;
      padding: 0 24px;
    }

    /* ===== 导航栏 ===== */
    .navbar {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 20px 0;
      border-bottom: 1px solid #eaeaea;  /* 极细分割线 */
    }

    .navbar .site-name {
      font-size: 1.25rem;
      font-weight: 600;
      letter-spacing: 1px;
      color: #1a1a1a;
    }

    .navbar .nav-links {
      list-style: none;
      display: flex;
      gap: 28px;
    }

    .navbar .nav-links a {
      text-decoration: none;
      color: #666;
      font-size: 0.9rem;
      transition: color 0.2s;
    }

    .navbar .nav-links a:hover {
      color: #1a1a1a;
    }

    /* ===== Banner 区域 ===== */
    .banner {
      text-align: center;
      padding: 80px 0 64px;
    }

    .banner h1 {
      font-size: 2.2rem;
      font-weight: 400;
      letter-spacing: 4px;
      color: #1a1a1a;
      margin-bottom: 16px;
    }

    .banner p {
      font-size: 1rem;
      color: #999;
      letter-spacing: 2px;
    }

    /* 装饰性细线，让 banner 有层次感 */
    .banner::after {
      content: "";
      display: block;
      width: 40px;
      height: 2px;
      background: #ccc;
      margin: 32px auto 0;
    }

    /* ===== 画廊网格 ===== */
    .gallery {
      display: grid;
      /* 默认：一行 3 列，每列等宽 */
      grid-template-columns: repeat(3, 1fr);
      gap: 20px;
      padding-bottom: 80px;
    }

    /* ===== 图片卡片 ===== */
    .gallery-item {
      position: relative;
      aspect-ratio: 4 / 3;        /* 统一 4:3 比例，视觉整齐 */
      background: #e8e8e8;        /* 加载前灰色底 */
      border: 1px solid #eee;     /* 极浅边框 */
      border-radius: 4px;
      overflow: hidden;
      transition: box-shadow 0.3s, transform 0.3s;
      cursor: default;
    }

    /* 悬停时轻微上浮 + 阴影，交互感 */
    .gallery-item:hover {
      box-shadow: 0 8px 30px rgba(0, 0, 0, 0.08);
      transform: translateY(-3px);
    }

    /* 真实图片 — 默认显示，铺满卡片 */
    .gallery-item img {
      display: block;
      width: 100%;
      height: 100%;
      object-fit: cover;   /* 裁剪填充，保持比例 */
      transition: transform 0.4s ease, opacity 0.4s;
    }

    /* 鼠标悬停时图片轻微放大，更有沉浸感 */
    .gallery-item:hover img {
      transform: scale(1.05);
    }

    /* 图片加载失败时的 fallback 样式 */
    .gallery-item img.error {
      opacity: 0.3;
      object-fit: contain;
      padding: 20px;
    }

    /* ===== 联系信息区域 ===== */
    .contact-section {
      text-align: center;
      padding: 60px 0 48px;
      border-top: 1px solid #eaeaea;
    }

    .contact-section h2 {
      font-size: 1.4rem;
      font-weight: 400;
      letter-spacing: 2px;
      color: #1a1a1a;
      margin-bottom: 20px;
    }

    .contact-section .contact-item {
      display: inline-flex;
      align-items: center;
      gap: 10px;
      font-size: 1rem;
      color: #666;
      letter-spacing: 1px;
    }

    .contact-section .contact-item .icon {
      font-size: 1.2rem;
    }

    /* 电话号码特殊样式 — 可点击拨打 */
    .contact-section .phone-link {
      color: #1a1a1a;
      text-decoration: none;
      border-bottom: 1px solid #ddd;
      padding-bottom: 2px;
      transition: border-color 0.2s;
    }

    .contact-section .phone-link:hover {
      border-color: #1a1a1a;
    }

    /* ===== Footer ===== */
    .footer {
      text-align: center;
      padding: 24px 0 32px;
      font-size: 0.85rem;
      color: #aaa;
      letter-spacing: 0.5px;
    }

    /* ===== 响应式：平板适配 ===== */
    @media (max-width: 900px) {
      .gallery {
        grid-template-columns: repeat(2, 1fr);  /* 平板：一行 2 列 */
        gap: 16px;
      }

      .banner {
        padding: 56px 0 48px;
      }

      .banner h1 {
        font-size: 1.8rem;
      }
    }

    /* ===== 响应式：手机适配 ===== */
    @media (max-width: 600px) {
      .container {
        padding: 0 16px;
      }

      .navbar {
        flex-direction: column;
        gap: 12px;
        padding: 16px 0;
      }

      .navbar .nav-links {
        gap: 20px;
      }

      .gallery {
        grid-template-columns: 1fr;   /* 手机：一行 1 列 */
        gap: 14px;
        padding-bottom: 48px;
      }

      .banner {
        padding: 40px 0 36px;
      }

      .banner h1 {
        font-size: 1.5rem;
        letter-spacing: 2px;
      }

      .contact-section {
        padding: 40px 0 32px;
      }
    }
  </style>
</head>
<body>

  <!-- ===== 顶部导航栏 ===== -->
  <div class="container">
    <nav class="navbar">
      <!-- 网站名称 -->
      <span class="site-name">我的影像空间</span>
      <!-- 导航链接 -->
      <ul class="nav-links">
        <li><a href="#">首页</a></li>
        <li><a href="#">画廊</a></li>
        <li><a href="#">关于</a></li>
        <li><a href="#">联系</a></li>
      </ul>
    </nav>
  </div>

  <!-- ===== Banner 欢迎区域 ===== -->
  <div class="container">
    <section class="banner">
      <h1>记录生活的美好瞬间</h1>
      <p>每一张照片，都是一段故事</p>
    </section>
  </div>

  <!-- ===== 图片画廊 ===== -->
  <div class="container">
    <section class="gallery">

      <!-- 图片 1：雪山日出 -->
      <div class="gallery-item">
        <img
          src="https://images.unsplash.com/photo-1506905925346-21bda4d32df4?w=800&q=80"
          alt="雪山日出"
          loading="lazy"
        >
      </div>

      <!-- 图片 2：林间溪流 -->
      <div class="gallery-item">
        <img
          src="https://images.unsplash.com/photo-1470071459604-3b5ec3a7fe05?w=800&q=80"
          alt="林间溪流"
          loading="lazy"
        >
      </div>

      <!-- 图片 3：极光星空 -->
      <div class="gallery-item">
        <img
          src="https://images.unsplash.com/photo-1504898770365-14faca6a7320?w=800&q=80"
          alt="极光星空"
          loading="lazy"
        >
      </div>

      <!-- 图片 4：海滩日落 -->
      <div class="gallery-item">
        <img
          src="https://images.unsplash.com/photo-1507525428034-b723cf961d3e?w=800&q=80"
          alt="海滩日落"
          loading="lazy"
        >
      </div>

      <!-- 图片 5：秋日山野 -->
      <div class="gallery-item">
        <img
          src="https://images.unsplash.com/photo-1472214103451-9374bd1c798e?w=800&q=80"
          alt="秋日山野"
          loading="lazy"
        >
      </div>

      <!-- 图片 6：森林光影 -->
      <div class="gallery-item">
        <img
          src="https://images.unsplash.com/photo-1441974231531-c6227db76b6e?w=800&q=80"
          alt="森林光影"
          loading="lazy"
        >
      </div>

    </section>
  </div>

  <!-- ===== 联系方式区域 ===== -->
  <div class="container">
    <section class="contact-section">
      <h2>联系我</h2>
      <div class="contact-item">
        <span class="icon">📞</span>
        <!-- 电话号码，手机上点击可直接拨号 -->
        <a class="phone-link" href="tel:18831780639">18831780639</a>
      </div>
    </section>
  </div>

  <!-- ===== Footer ===== -->
  <div class="container">
    <footer class="footer">
      © 2024 个人练手网站
    </footer>
  </div>

  <!-- ===== 增强脚本：图片加载失败时显示友好提示 ===== -->
  <script>
    // 当某张图片加载失败时（比如网络问题），显示一个友好的提示标记
    document.querySelectorAll('.gallery-item img').forEach(function (img) {
      img.addEventListener('error', function () {
        // 图片加载失败 — 在卡片内追加一个友好的占位提示
        var placeholder = document.createElement('div');
        placeholder.textContent = '图片加载失败';
        placeholder.style.cssText =
          'position:absolute; top:50%; left:50%; transform:translate(-50%,-50%); ' +
          'font-size:0.85rem; color:#bbb; letter-spacing:1px; pointer-events:none;';
        this.parentElement.appendChild(placeholder);
        // 把图片设为半透明，表示加载失败
        this.style.opacity = '0.15';
      });
    });

    console.log('炎龙侠说：画廊已刷新，风景照就位 🐉🏔️');
  </script>
</body>
</html>
